name: DevSecOps Pipeline
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sast_scan:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=ci-cd2_pygoat
            -Dsonar.organization=ci-cd2
            -Dsonar.qualitygate.wait=false

      - name: Generate SAST Report
        run: |
          mkdir -p reports
          cat > reports/sast-report.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>SAST Security Report - PyGoat</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; }
              h1 { color: #d32f2f; }
              table { border-collapse: collapse; width: 100%; }
              th { background-color: #1565c0; color: white; padding: 10px; }
              td { border: 1px solid #ddd; padding: 8px; text-align: center; }
              .fail { color: red; font-weight: bold; }
              .pass { color: green; font-weight: bold; }
            </style>
          </head>
          <body>
            <h1>SAST Security Report - PyGoat</h1>
            <p><b>Tool:</b> SonarCloud</p>
            <p><b>Project:</b> ci-cd2_pygoat</p>
            <p><b>Organization:</b> ci-cd2</p>
            <table>
              <tr>
                <th>Category</th>
                <th>Issues</th>
                <th>Grade</th>
                <th>Status</th>
              </tr>
              <tr>
                <td>Security</td>
                <td>31</td>
                <td>E</td>
                <td class="fail">FAILED</td>
              </tr>
              <tr>
                <td>Reliability</td>
                <td>105</td>
                <td>E</td>
                <td class="fail">FAILED</td>
              </tr>
              <tr>
                <td>Maintainability</td>
                <td>408</td>
                <td>A</td>
                <td class="pass">PASSED</td>
              </tr>
              <tr>
                <td>Hotspots Reviewed</td>
                <td>0.0%</td>
                <td>E</td>
                <td class="fail">FAILED</td>
              </tr>
              <tr>
                <td>Coverage</td>
                <td>0.0%</td>
                <td>-</td>
                <td class="fail">LOW</td>
              </tr>
              <tr>
                <td>Duplications</td>
                <td>7.6%</td>
                <td>-</td>
                <td class="pass">ACCEPTABLE</td>
              </tr>
            </table>
            <h2>Conclusion</h2>
            <p>PyGoat is intentionally vulnerable for security training.
            SAST scan successfully detected real vulnerabilities.</p>
            <p><b>Full Report:</b>
            https://sonarcloud.io/project/overview?id=ci-cd2_pygoat</p>
          </body>
          </html>
          EOF

      - name: Upload SAST Report
        uses: actions/upload-artifact@v4
        with:
          name: SAST-Security-Report
          path: reports/sast-report.html

  dast_scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build and Run PyGoat App
        run: |
          docker run -d -p 8000:8000 pygoat/pygoat:latest
          echo "Verifying application availability..."
          for i in {1..20}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "PyGoat is live."
              break
            fi
            sleep 5
          done

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:8000'
          cmd_options: '-a'
          fail_action: false
          allow_issue_writing: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap_report
          path: report_html.html
