name: DevSecOps Pipeline

on:
  push:
    branches: [ "master", "main" ]

jobs:
  sast_scan:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  
      
      sast_scan:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # THIS IS THE MISSING LINE WE NEEDED!
          SONAR_HOST_URL: "https://sonarcloud.io"
        with:
          args: >
            -Dsonar.projectKey=project-team-123_pygoat
            -Dsonar.organization=project-team-123

  dast_scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Build and Run PyGoat App
        run: |
          # Notice we removed the hyphen between docker and compose!
          docker compose up -d
          sleep 15 

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false 
