name: DevSecOps Pipeline

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  # ==========================================
  # SAST SCAN (SonarCloud)
  # ==========================================
  sast_scan:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=ci-cd2_pygoat
            -Dsonar.organization=ci-cd2
            -Dsonar.qualitygate.wait=false

  # ==========================================
  # DAST SCAN (OWASP ZAP)
  # ==========================================
  dast_scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Build and Run PyGoat App
        run: |
          # Start the container
          docker run -d -p 8000:8000 pygoat/pygoat:latest
          
          # Health Check Loop: Wait until port 8000 is accepting connections
          echo "Waiting for PyGoat to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "PyGoat is up and running!"
              break
            fi
            echo "Waiting (attempt $i/30)..."
            sleep 5
          done

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:8000'
          # -r generates the HTML report
          cmd_options: '-r report_html.html -a'
          fail_action: false 

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap_report
          path: report_html.html
