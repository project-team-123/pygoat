name: DevSecOps Pipeline

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

# Production standard: Define global permissions, override where necessary
permissions:
  contents: read

jobs:
  sast_scan:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=ci-cd2_pygoat
            -Dsonar.organization=ci-cd2
            -Dsonar.qualitygate.wait=false

  dast_scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    # Grant ONLY the permissions required for ZAP to report bugs as issues
    permissions:
      issues: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Build and Run PyGoat App
        run: |
          docker run -d -p 8000:8000 pygoat/pygoat:latest
          
          echo "Verifying application availability..."
          for i in {1..20}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "PyGoat is live."
              break
            fi
            sleep 5
          done

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:8000'
          # '-a' runs all rules. 'fail_action: false' ensures the pipeline finishes 
          # so your report is always generated, regardless of vulnerability severity.
          cmd_options: '-a'
          fail_action: false
          issue_action: true # Set to false if you want to stop creating GitHub Issues

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap_report
          path: report_html.html
